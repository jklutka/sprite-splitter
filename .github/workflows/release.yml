name: Release

on:
  push:
    tags:
      - "v*"          # trigger on version tags like v1.0.0, v1.2.3

permissions:
  contents: write    # needed to create GitHub Releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: sprite-splitter-windows
            exe_name: sprite-splitter.exe
          - os: ubuntu-latest
            artifact: sprite-splitter-linux
            exe_name: sprite-splitter
          - os: macos-latest
            artifact: sprite-splitter-macos
            exe_name: sprite-splitter

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux Qt)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install package + PyInstaller
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Stamp version and build date
        shell: python
        run: |
          import re, datetime, pathlib
          init = pathlib.Path("src/sprite_splitter/__init__.py")
          text = init.read_text()
          tag = "${{ github.ref_name }}".lstrip("v")
          today = datetime.date.today().isoformat()
          text = re.sub(r'__version__\s*=\s*"[^"]*"', f'__version__ = "{tag}"', text)
          text = re.sub(r'__build_date__\s*=\s*"[^"]*"', f'__build_date__ = "{today}"', text)
          init.write_text(text)
          print(f"Stamped version={tag} build_date={today}")

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v

      - name: Build executable
        run: >
          pyinstaller
          --name sprite-splitter
          --onefile
          --windowed
          --hidden-import sprite_splitter
          --add-data "src/sprite_splitter:sprite_splitter"
          src/sprite_splitter/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.exe_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # Rename artifacts to include OS
          cp artifacts/sprite-splitter-windows/sprite-splitter.exe release/sprite-splitter-windows.exe
          cp artifacts/sprite-splitter-linux/sprite-splitter       release/sprite-splitter-linux
          cp artifacts/sprite-splitter-macos/sprite-splitter       release/sprite-splitter-macos
          chmod +x release/sprite-splitter-linux release/sprite-splitter-macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/sprite-splitter-windows.exe
            release/sprite-splitter-linux
            release/sprite-splitter-macos
